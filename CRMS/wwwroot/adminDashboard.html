<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Amal Hospital | Admin Dashboard</title>
  <link rel="icon" type="image/webp" href="amal-logo.webp" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button id="menu-toggle" class="btn-burger" aria-label="Open menu" data-i18n-aria="topbar.openMenu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="topbar__logo" />
    </div>
    <div class="topbar__user">
      <div class="topbar__user-info">
        <span id="welcome-name">—</span>
        <span id="welcome-role" class="badge">—</span>
      </div>
      <button id="lang-toggle" class="btn-lang">العربية</button>
      <button id="logout-btn" class="btn-logout" data-i18n="topbar.logout">Log out</button>
    </div>
  </header>

  <div id="drawer-overlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer" aria-label="Main navigation">
    <div class="drawer__header">
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="drawer__logo" />
      <button type="button" class="modal-close" id="drawer-close" aria-label="Close menu" data-i18n-aria="topbar.closeMenu">&times;</button>
    </div>
    <ul id="drawer-nav-list" class="drawer__nav"></ul>
  </nav>

  <main class="dashboard">
    <section class="users-panel">
      <div class="users-panel__header">
        <div>
          <h1 data-i18n="admin.title">Admin Dashboard</h1>
          <p data-i18n="admin.subtitle">Overview of all cases and referral activity across the team.</p>
        </div>
      </div>

      <!-- Statistics -->
      <div id="stats-loading" class="users-empty" data-i18n="loading.stats">Loading statistics…</div>
      <div id="stats-error" class="form-error" role="alert" hidden></div>

      <div id="stats-section" hidden>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__label" data-i18n="admin.totalCases">Total Cases</div>
            <div class="stat-card__value" id="stat-total">—</div>
          </div>
          <div class="stat-card stat-card--success">
            <div class="stat-card__label" data-i18n="status.success">Success</div>
            <div class="stat-card__value" id="stat-success">—</div>
            <div class="stat-card__sub" id="stat-success-pct">— of total</div>
          </div>
          <div class="stat-card stat-card--failed">
            <div class="stat-card__label" data-i18n="status.failed">Failed</div>
            <div class="stat-card__value" id="stat-failed">—</div>
            <div class="stat-card__sub" id="stat-failed-pct">— of total</div>
          </div>
        </div>

        <h2 class="admin-section-title" data-i18n="admin.referralSources">Referral Sources</h2>
        <div class="users-table-wrap" style="margin-bottom: 32px;">
          <table class="users-table">
            <thead>
              <tr>
                <th data-i18n="col.source">Source</th>
                <th data-i18n="col.cases">Cases</th>
                <th style="width: 45%;" data-i18n="col.shareOfTotal">Share of total</th>
              </tr>
            </thead>
            <tbody id="referral-stats-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Cases -->
      <h2 class="admin-section-title" data-i18n="admin.allCases">All Cases</h2>

      <div class="admin-filter-bar">
        <div class="cases-search field">
          <div class="field__control">
            <input type="search" id="admin-search" placeholder="Search by name or phone…" data-i18n-placeholder="search.placeholder" autocomplete="off" />
          </div>
        </div>
        <div class="field admin-user-select">
          <div class="field__control field__control--select">
            <select id="admin-user-filter">
              <option value="" data-i18n="admin.allEmployees">All employees</option>
            </select>
          </div>
        </div>
        <label class="admin-today-toggle">
          <input type="checkbox" id="admin-today-only" />
          <span data-i18n="admin.todayOnly">Today only</span>
        </label>
      </div>

      <div id="admin-cases-error" class="form-error" role="alert" hidden></div>
      <div id="admin-cases-list"></div>
      <div id="admin-cases-loading" class="users-empty" data-i18n="loading.cases">Loading cases…</div>
      <div id="admin-cases-empty" class="users-empty" hidden></div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/adminDashboard.js"></script>
</body>
</html>
