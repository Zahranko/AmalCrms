<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Amal Hospital | System Parameters</title>
  <link rel="icon" type="image/webp" href="amal-logo.webp" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button id="menu-toggle" class="btn-burger" aria-label="Open menu" data-i18n-aria="topbar.openMenu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="topbar__logo" />
    </div>
    <div class="topbar__user">
      <div class="topbar__user-info">
        <span id="welcome-name">—</span>
        <span id="welcome-role" class="badge">—</span>
      </div>
      <button id="lang-toggle" class="btn-lang">العربية</button>
      <button id="logout-btn" class="btn-logout" data-i18n="topbar.logout">Log out</button>
    </div>
  </header>

  <div id="drawer-overlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer" aria-label="Main navigation">
    <div class="drawer__header">
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="drawer__logo" />
      <button type="button" class="modal-close" id="drawer-close" aria-label="Close menu" data-i18n-aria="topbar.closeMenu">&times;</button>
    </div>
    <ul id="drawer-nav-list" class="drawer__nav"></ul>
  </nav>

  <main class="dashboard">
    <section class="users-panel">
      <div class="users-panel__header">
        <div>
          <h1 data-i18n="systemParams.title">System Parameters</h1>
          <p><span data-i18n="systemParams.subtitle">Per-website settings.</span> <strong id="sp-website-name"></strong></p>
        </div>
        <button type="button" id="sp-add-btn" class="btn-primary" data-i18n="systemParams.add">+ Add Parameter</button>
      </div>

      <div id="sp-error" class="form-error" role="alert" hidden></div>
      <div id="sp-loading" class="users-empty" data-i18n="systemParams.loading">Loading parameters…</div>

      <div id="sp-editor" hidden>
        <div class="users-table-wrap">
          <table class="users-table">
            <thead>
              <tr>
                <th style="width: 38%;" data-i18n="systemParams.key">Key</th>
                <th data-i18n="systemParams.value">Value</th>
                <th style="width: 60px;"></th>
              </tr>
            </thead>
            <tbody id="sp-rows"></tbody>
          </table>
        </div>
        <div id="sp-empty" class="users-empty" data-i18n="systemParams.empty" hidden>No parameters yet.</div>

        <div class="modal-actions" style="justify-content: flex-start; margin-top: 18px;">
          <button type="button" id="sp-save-btn" class="btn-submit">
            <span class="btn-submit__label" data-i18n="action.save">Save</span>
            <span class="btn-submit__spinner" hidden></span>
          </button>
          <span id="sp-saved" class="sp-saved" data-i18n="systemParams.saved" hidden>Saved.</span>
        </div>
      </div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/systemParams.js"></script>
</body>
</html>
