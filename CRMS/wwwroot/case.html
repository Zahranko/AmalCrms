<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Amal Hospital | Case</title>
  <link rel="icon" type="image/webp" href="amal-logo.webp" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button id="menu-toggle" class="btn-burger" aria-label="Open menu" data-i18n-aria="topbar.openMenu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="topbar__logo" />
    </div>
    <div class="topbar__user">
      <div class="topbar__user-info">
        <span id="welcome-name">—</span>
        <span id="welcome-role" class="badge">—</span>
      </div>
      <button id="lang-toggle" class="btn-lang">العربية</button>
      <button id="logout-btn" class="btn-logout" data-i18n="topbar.logout">Log out</button>
    </div>
  </header>

  <div id="drawer-overlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer" aria-label="Main navigation">
    <div class="drawer__header">
      <img src="amal-logo.webp" alt="Al Amal Hospital" class="drawer__logo" />
      <button type="button" class="modal-close" id="drawer-close" aria-label="Close menu" data-i18n-aria="topbar.closeMenu">&times;</button>
    </div>
    <ul id="drawer-nav-list" class="drawer__nav"></ul>
  </nav>

  <main class="dashboard">
    <a href="cases-mine.html" class="back-link" id="back-link" data-i18n="case.backToCases">&larr; Back to cases</a>

    <div id="case-error" class="form-error" role="alert" hidden></div>
    <div id="case-loading" class="users-empty" data-i18n="loading.case">Loading case…</div>

    <section id="case-detail" class="case-detail" hidden>
      <div class="case-detail__header">
        <div class="case-detail__title">
          <h1 id="case-name">—</h1>
          <span id="case-status" class="status-pill status-pill--pending">—</span>
        </div>
        <div class="case-detail__actions" id="case-actions"></div>
      </div>

      <div class="detail-grid" id="case-fields"></div>

      <div class="case-section">
        <h2 data-i18n="case.history">History</h2>
        <ul class="timeline" id="case-timeline"></ul>
      </div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/case.js"></script>
</body>
</html>
